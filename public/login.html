<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Our Wealth</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💷</text></svg>" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e1526; color: #e8edf7;
    }
    .card {
      width: min(360px, 90vw); background: #16203a; border: 1px solid #26324f;
      border-radius: 16px; padding: 32px 28px; box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .brand { font-size: 40px; text-align: center; }
    h1 { font-size: 20px; text-align: center; margin: 8px 0 24px; font-weight: 600; }
    label { display: block; font-size: 13px; color: #9fb0d0; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #2d3a5c;
      background: #0e1526; color: #e8edf7; font-size: 15px;
    }
    input:focus { outline: 2px solid #5b8cff; border-color: transparent; }
    button {
      width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 10px;
      background: #5b8cff; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #4a7bf0; }
    button:disabled { opacity: .6; cursor: default; }
    .err { color: #ff8095; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="brand">💷</div>
    <h1>Our Wealth</h1>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        if (r.ok) { window.location = '/'; return; }
        err.textContent = 'Wrong password';
      } catch {
        err.textContent = 'Something went wrong';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
