<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f6fc" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Our Wealth" />
  <title>Sign in · Our Wealth</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💷</text></svg>" />
  <style>
    * { box-sizing: border-box; }
    html { background: #f4f6fc; color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      padding: 24px max(24px, env(safe-area-inset-right)) 24px max(24px, env(safe-area-inset-left));
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f4f6fc; color: #191d2e; position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: '';
      position: fixed; inset: -10vmax; z-index: -1;
      background:
        radial-gradient(36vmax 36vmax at 16% 12%, rgba(99,102,241,.40), transparent 62%),
        radial-gradient(32vmax 32vmax at 88% 18%, rgba(232,121,249,.34), transparent 62%),
        radial-gradient(38vmax 38vmax at 22% 92%, rgba(52,211,153,.30), transparent 62%),
        radial-gradient(28vmax 28vmax at 92% 90%, rgba(34,211,238,.26), transparent 62%),
        #f4f6fc;
      animation: drift 50s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { transform: scale(1) translate(0,0) rotate(0deg); }
      100% { transform: scale(1.08) translate(-2%,2%) rotate(2deg); }
    }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }
    .card {
      width: min(380px, 100%);
      background:
        linear-gradient(135deg, rgba(255,255,255,.75), rgba(255,255,255,.15) 45%),
        linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.38));
      border: 1px solid rgba(255,255,255,.8);
      -webkit-backdrop-filter: blur(24px) saturate(190%);
      backdrop-filter: blur(24px) saturate(190%);
      border-radius: 28px; padding: 36px 30px;
      box-shadow: 0 16px 44px rgba(30,41,59,.14), 0 2px 8px rgba(30,41,59,.06), inset 0 1px 0 rgba(255,255,255,.8);
    }
    .brand { font-size: 42px; text-align: center; }
    h1 {
      font-size: 20px; text-align: center; margin: 8px 0 26px; font-weight: 800;
      background: linear-gradient(90deg, #4338ca, #a21caf);
      -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
    }
    label { display: block; font-size: 13px; color: #5c6280; margin-bottom: 8px; font-weight: 700; }
    input {
      width: 100%; padding: 13px 15px; border-radius: 14px; border: 1px solid rgba(30,41,59,.12);
      background: rgba(255,255,255,.55); color: #191d2e; font-size: 16px; outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }
    input:focus {
      border-color: #4f46e5; background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 4px rgba(79,70,229,.18);
    }
    button {
      width: 100%; margin-top: 18px; padding: 13px; border: none; border-radius: 999px;
      min-height: 48px;
      background: linear-gradient(135deg, #4f46e5, #a21caf);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 22px rgba(79,70,229,.35), inset 0 1px 0 rgba(255,255,255,.35);
      transition: transform .12s ease, filter .15s ease;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .6; cursor: default; }
    .err { color: #be123c; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; font-weight: 600; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="brand">💷</div>
    <h1>Our Wealth</h1>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        if (r.ok) { window.location = '/'; return; }
        err.textContent = 'Wrong password';
      } catch {
        err.textContent = 'Something went wrong';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
