<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070b14" />
  <title>Sign in · Our Wealth</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💷</text></svg>" />
  <style>
    * { box-sizing: border-box; }
    html { background: #070b14; color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      padding: 24px max(24px, env(safe-area-inset-right)) 24px max(24px, env(safe-area-inset-left));
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #070b14; color: #eef1f8; position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: '';
      position: fixed; inset: -10vmax; z-index: -1;
      background:
        radial-gradient(38vmax 38vmax at 18% 15%, rgba(91,140,255,.38), transparent 60%),
        radial-gradient(34vmax 34vmax at 85% 20%, rgba(167,139,250,.30), transparent 60%),
        radial-gradient(40vmax 40vmax at 25% 90%, rgba(52,208,164,.22), transparent 60%),
        #070b14;
      animation: drift 50s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { transform: scale(1) translate(0,0) rotate(0deg); }
      100% { transform: scale(1.08) translate(-2%,2%) rotate(2deg); }
    }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }
    .card {
      width: min(380px, 100%);
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,0) 45%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.16);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      backdrop-filter: blur(24px) saturate(170%);
      border-radius: 28px; padding: 36px 30px;
      box-shadow: 0 16px 50px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .brand { font-size: 42px; text-align: center; }
    h1 { font-size: 20px; text-align: center; margin: 8px 0 26px; font-weight: 600; }
    label { display: block; font-size: 13px; color: #9fabc7; margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%; padding: 13px 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05); color: #eef1f8; font-size: 16px; outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }
    input:focus {
      border-color: rgba(91,140,255,.65); background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 4px rgba(91,140,255,.18);
    }
    button {
      width: 100%; margin-top: 18px; padding: 13px; border: none; border-radius: 999px;
      min-height: 48px;
      background: linear-gradient(135deg, rgba(91,140,255,.95), rgba(74,120,230,.85));
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 6px 20px rgba(91,140,255,.35), inset 0 1px 0 rgba(255,255,255,.35);
      transition: transform .12s ease, filter .15s ease;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .6; cursor: default; }
    .err { color: #ff8095; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="brand">💷</div>
    <h1>Our Wealth</h1>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        if (r.ok) { window.location = '/'; return; }
        err.textContent = 'Wrong password';
      } catch {
        err.textContent = 'Something went wrong';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
